version: "3.9"

services:
  backend:
    build: ./backend
    container_name: personatwin-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    volumes:
      - backend_data:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: personatwin-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

  # Optional real Qdrant server. The backend also works with zero setup
  # using an embedded local Qdrant if you remove QDRANT_URL above.
  qdrant:
    image: qdrant/qdrant:latest
    container_name: personatwin-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  backend_data:
  qdrant_storage:
